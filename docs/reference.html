<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Client — Code Reference (plain HTML/CSS/JS, no design-tool runtime)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /*
    Plain, framework-free reproduction of the email client design.
    Port these exact values/classes/animations into the app's real stack.
    Swap --accent-start / --accent-end to retheme.
  */
  :root {
    --bg-base: #07080d;
    --accent-start: #29A3E8;
    --accent-end: #8B5CF6;
    --accent-gradient: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    --accent-glow: rgba(41,163,232,0.35);
    --accent-glow-soft: rgba(139,92,246,0.22);
    --text-heading: #f5f6fa;
    --text-body: #c3c7d4;
    --text-muted: #8890a3;
    --text-faint: #565d70;
    --panel-border: rgba(255,255,255,0.07);
  }
  * , *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Manrope', system-ui, sans-serif; background: var(--bg-base); overflow: hidden; }
  ::selection { background: rgba(139,92,246,0.35); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes floatA { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px,-24px); } }
  @keyframes floatB { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-26px,28px); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity:0; transform: translateY(18px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes toastIn { from { opacity:0; transform: translateY(10px) translateX(-50%); } to { opacity:1; transform: translateY(0) translateX(-50%); } }
  @keyframes composeSlideUp { from { opacity:0; transform: translateY(100%); } to { opacity:1; transform: translateY(0); } }

  .app { position: relative; height: 100vh; width: 100%; background: var(--bg-base); overflow: hidden; display: flex; }
  .dot-grid { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0); background-size: 34px 34px; pointer-events: none; }
  .glow { position: absolute; border-radius: 50%; pointer-events: none; }
  .glow-tl { top: -180px; left: -140px; width: 520px; height: 520px; background: var(--accent-start); opacity: 0.22; filter: blur(120px); animation: floatA 18s ease-in-out infinite; }
  .glow-br { bottom: -200px; right: -160px; width: 560px; height: 560px; background: var(--accent-end); opacity: 0.18; filter: blur(130px); animation: floatB 21s ease-in-out infinite; }
  .glow-tr1 { top: -220px; right: -180px; width: 640px; height: 640px; background: var(--accent-end); opacity: 0.16; filter: blur(140px); animation: floatB 24s ease-in-out infinite reverse; }
  .glow-tr2 { top: 30%; right: 8%; width: 360px; height: 360px; background: var(--accent-start); opacity: 0.09; filter: blur(110px); animation: floatA 20s ease-in-out infinite; }

  .app-shell { position: relative; z-index: 1; display: flex; width: 100%; height: 100%; }

  /* -------- sidebar -------- */
  .sidebar { position: relative; flex-shrink: 0; width: 224px; height: 100%; background: rgba(14,16,26,0.55); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; padding: 22px 16px; overflow: hidden; }
  #sidebar-particles { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .sidebar > * { position: relative; z-index: 1; }

  .brand-row { display: flex; align-items: center; gap: 10px; padding: 4px 8px 20px; }
  .brand-mark { width: 34px; height: 34px; border-radius: 10px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 6px 16px var(--accent-glow); }
  .brand-name { font-size: 16.5px; font-weight: 800; color: #f3f4f8; letter-spacing: -0.01em; }

  .profile-card { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px; margin-bottom: 16px; }
  .profile-avatar { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg,#3B82F6,#8B5CF6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; color: white; }
  .profile-name { font-size: 13.5px; font-weight: 700; color: #eceef4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-email { font-size: 11.5px; color: #7d8496; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .compose-btn { display: flex; align-items: center; justify-content: center; gap: 8px; height: 46px; border-radius: 13px; background: var(--accent-gradient); color: white; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 10px 24px -8px var(--accent-glow); transition: transform .18s, box-shadow .18s; margin-bottom: 18px; border: none; width: 100%; font-family: inherit; }
  .compose-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -8px var(--accent-glow); }
  .compose-btn:active { transform: translateY(0); }

  .nav-list { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; overflow-x: hidden; }
  .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 11px; background: transparent; color: var(--text-muted); font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .nav-item.active { background: rgba(255,255,255,0.06); color: #f0f1f6; font-weight: 700; }
  .nav-item-label { display: flex; align-items: center; gap: 11px; }
  .nav-badge { font-size: 11px; font-weight: 700; color: white; background: var(--accent-gradient); border-radius: 10px; padding: 2px 8px; }

  .storage { padding: 14px 10px 4px; }
  .storage-track { height: 5px; border-radius: 4px; background: rgba(255,255,255,0.07); overflow: hidden; margin-bottom: 8px; }
  .storage-fill { height: 100%; width: 12%; border-radius: 4px; background: var(--accent-gradient); }
  .storage-label { font-size: 11px; color: #5f6579; }

  /* -------- main column -------- */
  .main-col { position: relative; flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; }
  .reading-glow { position: absolute; top: -120px; right: -120px; width: 520px; height: 520px; border-radius: 50%; background: var(--accent-end); pointer-events: none; filter: blur(120px); opacity: 0.12; transform: scale(0.8); transition: opacity .38s cubic-bezier(.22,1,.36,1), transform .38s cubic-bezier(.22,1,.36,1); }
  .reading-glow.on { opacity: 0.32; transform: scale(1); }

  .topbar { flex-shrink: 0; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(12,14,22,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 1; }
  .topbar-date { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 12.5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .topbar-icons { display: flex; align-items: center; gap: 6px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: #e6e8f0; }
  .icon-btn.accent { background: var(--accent-gradient); color: white; box-shadow: 0 4px 14px var(--accent-glow); }
  .icon-btn.accent:hover { background: var(--accent-gradient); color: white; }

  .main-row { flex: 1; min-height: 0; display: flex; position: relative; z-index: 1; }

  /* list panel width is the only thing that transitions — reading pane is flex:1
     and resizes smoothly every frame as the sibling's width animates. */
  .list-panel { width: 340px; min-width: 0; max-width: 100%; flex: 0 0 auto; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid rgba(255,255,255,0.06); transition: width .32s cubic-bezier(.22,1,.36,1), border-color .2s; }
  .list-panel.full { width: 100%; border-right-color: transparent; }

  .list-header { flex-shrink: 0; padding: 18px 20px 14px; }
  .list-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .list-title { font-size: 20px; font-weight: 800; color: var(--text-heading); letter-spacing: -0.01em; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #5a6178; }
  .search-input { width: 100%; height: 38px; padding: 0 14px 0 38px; border-radius: 10px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); color: #eceef4; font-size: 13.5px; font-family: inherit; outline: none; }
  .search-input:focus { border-color: var(--accent-start); box-shadow: 0 0 0 3px var(--accent-glow-soft); }

  .list-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 10px 14px; }
  .email-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 10px; border-radius: 13px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; }
  .email-row.selected { background: rgba(41,163,232,0.12); border-color: rgba(41,163,232,0.3); }
  .email-avatar { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12.5px; font-weight: 700; color: white; }
  .email-main { flex: 1; min-width: 0; }
  .email-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
  .email-sender { font-size: 13.5px; color: #c3c7d4; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .email-sender.unread { color: #f0f1f6; font-weight: 700; }
  .email-time { font-size: 11.5px; color: #5f6579; flex-shrink: 0; }
  .email-subject { font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
  .email-subject.unread { color: #d7dae2; font-weight: 600; }
  .email-preview { font-size: 12.5px; color: #6b7386; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-start); flex-shrink: 0; margin-top: 5px; box-shadow: 0 0 8px var(--accent-start); }

  .empty-folder, .empty-pane { display: flex; flex-direction: column; align-items: center; text-align: center; color: var(--text-faint); }
  .empty-folder { padding: 60px 20px; }
  .empty-pane { flex: 1; justify-content: center; }
  .empty-pane-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }

  .reading-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .reading-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px 32px; animation: fadeIn .3s ease both; }
  .back-link { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 18px; width: fit-content; }
  .back-link:hover { color: #e6e8f0; }
  .reading-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  .reading-subject { font-size: 21px; font-weight: 800; color: var(--text-heading); letter-spacing: -0.01em; line-height: 1.3; min-width: 0; }
  .reading-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .reading-actions .icon-btn.danger:hover { color: #f36565; }
  .reading-meta { display: flex; align-items: center; gap: 12px; padding-bottom: 24px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .reading-avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 700; color: white; }
  .reading-sender { font-size: 14.5px; font-weight: 700; color: #eceef4; }
  .reading-email { font-size: 12.5px; color: var(--text-muted); }
  .reading-time { font-size: 12.5px; color: #6b7386; flex-shrink: 0; }
  .reading-body { font-size: 15px; line-height: 1.75; color: var(--text-body); max-width: 640px; }
  .reading-body p { margin: 0 0 16px; }

  /* -------- compose modal -------- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(4,5,10,0.65); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 50; animation: fadeIn .2s ease both; }
  .modal-overlay.open { display: flex; }
  .modal-wrap { position: relative; width: 640px; max-width: 92vw; max-height: 86vh; }
  .modal-ambient-glow { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; border-radius: 50%; background: var(--accent-start); opacity: 0.28; filter: blur(80px); pointer-events: none; }
  .modal-card { position: relative; display: flex; flex-direction: column; max-height: 86vh; background: rgba(19,22,35,0.85); backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 40px 90px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02) inset; overflow: hidden; animation: modalIn .35s cubic-bezier(.22,1,.36,1) both; }
  .modal-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 20px 22px 16px; }
  .modal-title-row { display: flex; align-items: center; gap: 11px; }
  .modal-badge { width: 32px; height: 32px; border-radius: 10px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 6px 16px var(--accent-glow); }
  .modal-title { font-size: 15.5px; font-weight: 700; color: #f0f1f6; }

  .modal-fields { flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; padding: 0 22px 18px; }
  .modal-field { display: flex; align-items: center; gap: 10px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08); padding: 0 14px; }
  .modal-field:focus-within { border-color: var(--accent-start); box-shadow: 0 0 0 3px var(--accent-glow-soft); }
  .modal-field input { flex: 1; border: none; background: transparent; color: #eceef4; font-size: 13.5px; font-family: inherit; outline: none; }
  .modal-field input.subject-input { font-weight: 600; }

  .modal-toolbar { flex-shrink: 0; display: flex; align-items: center; gap: 2px; margin: 0 22px 14px; padding: 6px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); width: fit-content; }
  .modal-toolbar .icon-btn { width: 30px; height: 30px; border-radius: 8px; }
  .toolbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 5px; }

  .modal-body { flex: 1; min-height: 170px; resize: none; border: none; background: transparent; color: #d7dae2; font-size: 14px; font-family: inherit; line-height: 1.7; outline: none; padding: 0 22px 18px; width: 100%; }

  .modal-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06); }
  .footer-actions { display: flex; align-items: center; gap: 10px; }
  .btn-outline { height: 40px; padding: 0 18px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #e6e8f0; font-size: 13.5px; font-weight: 700; display: flex; align-items: center; cursor: pointer; font-family: inherit; }
  .btn-outline:hover { background: rgba(255,255,255,0.08); }
  .btn-send { height: 40px; padding: 0 22px; border-radius: 11px; background: var(--accent-gradient); color: white; font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 10px 24px -8px var(--accent-glow); transition: transform .18s; border: none; font-family: inherit; }
  .btn-send:hover { transform: translateY(-2px); }
  .btn-send:active { transform: translateY(0); }

  /* -------- compose windows (Gmail-style, docked bottom-right, stackable) -------- */
  .compose-window { position: fixed; bottom: 0; width: 320px; display: flex; flex-direction: column; background: rgba(19,22,35,0.92); backdrop-filter: blur(26px) saturate(160%); -webkit-backdrop-filter: blur(26px) saturate(160%); border: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 14px; border-top-right-radius: 14px; box-shadow: 0 -20px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02) inset; overflow: hidden; transition: height .22s cubic-bezier(.22,1,.36,1); animation: composeSlideUp .3s cubic-bezier(.22,1,.36,1) both; }
  .compose-window.expanded { height: 440px; }
  .compose-window.minimized { height: 44px; }
  .compose-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.03); cursor: pointer; }
  .compose-window.expanded .compose-header { border-bottom: 1px solid rgba(255,255,255,0.07); }
  .compose-header-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .compose-badge { width: 22px; height: 22px; border-radius: 7px; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .compose-title { font-size: 13px; font-weight: 700; color: #f0f1f6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .compose-header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .compose-icon-btn { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #8890a3; cursor: pointer; }
  .compose-icon-btn:hover { background: rgba(255,255,255,0.08); color: #e6e8f0; }
  .compose-icon-btn.danger:hover { color: #f36565; }
  .compose-body { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .compose-window.minimized .compose-body { display: none; }
  .compose-fields { flex-shrink: 0; display: flex; flex-direction: column; padding: 0 16px; }
  .compose-field-row { display: flex; align-items: center; gap: 9px; height: 38px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .compose-field-row .field-prefix { font-size: 12.5px; color: #7d8496; flex-shrink: 0; }
  .compose-field-row input { flex: 1; border: none; background: transparent; color: #eceef4; font-size: 13px; font-family: inherit; outline: none; }
  .compose-field-row input.subject { font-weight: 600; }
  .compose-textarea { flex: 1; min-height: 120px; resize: none; border: none; background: transparent; color: #d7dae2; font-size: 13.5px; font-family: inherit; line-height: 1.7; outline: none; padding: 14px 16px; width: 100%; }
  .compose-toolbar { flex-shrink: 0; display: flex; align-items: center; gap: 2px; margin: 0 16px 10px; padding: 5px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); width: fit-content; }
  .compose-toolbar .compose-icon-btn svg { width: 12px; height: 12px; }
  .compose-toolbar-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.1); margin: 0 4px; }
  .compose-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06); }
  .compose-send-btn { height: 34px; padding: 0 18px; border-radius: 9px; background: var(--accent-gradient); color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; cursor: pointer; box-shadow: 0 8px 20px -8px var(--accent-glow); transition: transform .18s; border: none; font-family: inherit; }
  .compose-send-btn:hover { transform: translateY(-2px); }
  .compose-send-btn:active { transform: translateY(0); }


  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(20,23,36,0.92); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); color: #eceef4; font-size: 13.5px; font-weight: 600; padding: 12px 20px; border-radius: 12px; box-shadow: 0 20px 50px -12px rgba(0,0,0,0.6); z-index: 60; display: none; align-items: center; gap: 10px; animation: toastIn .25s ease both; }
  .toast.show { display: flex; }
  .toast-icon { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app">
  <div class="dot-grid"></div>
  <div class="glow glow-tl"></div>
  <div class="glow glow-br"></div>
  <div class="glow glow-tr1"></div>
  <div class="glow glow-tr2"></div>

  <div class="app-shell">

    <!-- ============ SIDEBAR ============ -->
    <div class="sidebar">
      <canvas id="sidebar-particles"></canvas>

      <div class="brand-row">
        <div class="brand-mark">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="white" fill-opacity="0.95"/></svg>
        </div>
        <div class="brand-name">Innovayse Mail</div>
      </div>

      <div class="profile-card">
        <div class="profile-avatar">TU</div>
        <div style="min-width:0;flex:1;">
          <div class="profile-name">Test User</div>
          <div class="profile-email">test@innovayse.com</div>
        </div>
        <div class="icon-btn" style="padding:4px;width:auto;height:auto;">

  // ================== STATE ==================
  let state = { folder: 'inbox', selectedId: null };

  // ================== RENDER: NAV ==================
  function renderNav() {
    const nav = document.getElementById('nav-list');
    nav.innerHTML = FOLDERS.map(f => {
      const active = f.key === state.folder;
      const unreadCount = f.key === 'inbox' ? emails.filter(e => e.folder === 'inbox' && e.unread).length : 0;
      return `
        <div class="nav-item ${active ? 'active' : ''}" onclick="selectFolder('${f.key}')">
          <div class="nav-item-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">${f.icon}</svg>
            <span>${f.label}</span>
          </div>
          ${unreadCount > 0 ? `<span class="nav-badge">${unreadCount}</span>` : ''}
        </div>`;
    }).join('');
  }

  // ================== RENDER: LIST ==================
  function renderList() {
    document.getElementById('folder-label').textContent = FOLDERS.find(f => f.key === state.folder).label;
    const rows = emails.filter(e => e.folder === state.folder);
    const scroll = document.getElementById('list-scroll');

    if (rows.length === 0) {
      scroll.innerHTML = `
        <div class="empty-folder">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px;opacity:0.6;"><rect x="3" y="5.5" width="18" height="13" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 8.5L12 13.5L21 8.5" stroke="currentColor" stroke-width="1.6"/></svg>
          <div style="font-size:13.5px;">This folder is empty</div>
        </div>`;
      return;
    }

    scroll.innerHTML = rows.map(e => `
      <div class="email-row ${e.id === state.selectedId ? 'selected' : ''}" onclick="selectEmail(${e.id})">
        <div class="email-avatar" style="background:${e.gradient};">${e.initials}</div>
        <div class="email-main">
          <div class="email-top-row">
            <span class="email-sender ${e.unread ? 'unread' : ''}">${e.sender}</span>
            <span class="email-time">${e.time}</span>
          </div>
          <div class="email-subject ${e.unread ? 'unread' : ''}">${e.subject}</div>
          <div class="email-preview">${e.preview}</div>
        </div>
        ${e.unread ? '<div class="unread-dot"></div>' : ''}
      </div>
    `).join('');
  }

  // ================== RENDER: READING PANE ==================
  function renderReadingPane() {
    const pane = document.getElementById('reading-pane');
    const email = emails.find(e => e.id === state.selectedId && e.folder === state.folder);

    if (!email) {
      pane.innerHTML = `
        <div class="empty-pane">
          <div class="empty-pane-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="color:#565d70;"><rect x="3" y="5.5" width="18" height="13" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 8.5L12 13.5L21 8.5" stroke="currentColor" stroke-width="1.6"/></svg>
          </div>
          <div style="font-size:14.5px;color:#565d70;">Select a message to read</div>
        </div>`;
      return;
    }

    pane.innerHTML = `
      <div class="reading-scroll">
        <div class="back-link" onclick="closeReading()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L11 6M5 12L11 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

          ${email.body.map(p => `<p>${p}</p>`).join('')}

  // ================== RENDER: LIST-PANEL WIDTH / GLOW ==================
  function renderLayout() {
    const hasSelection = !!emails.find(e => e.id === state.selectedId && e.folder === state.folder);
    document.getElementById('list-panel').classList.toggle('full', !hasSelection);
    document.getElementById('reading-glow').classList.toggle('on', hasSelection);
  }

  function renderAll() {
    renderNav();
    renderList();
    renderReadingPane();
    renderLayout();
  }

  // ================== ACTIONS ==================
  function selectFolder(key) {
    state.folder = key;
    state.selectedId = null; // collapses reading pane, list goes full width — Gmail style
    renderAll();
  }

  function selectEmail(id) {
    const e = emails.find(x => x.id === id);
    if (e) e.unread = false;
    state.selectedId = id;
    renderAll();
  }

  function closeReading() {
    state.selectedId = null;
    renderAll();
  }

  let composeWindows = []; // { id, minimized, subject }
  let nextComposeId = 1;

    const container = document.getElementById('compose-windows-container');
    container.innerHTML = composeWindows.map((w, idx) => {
      const rightFromEnd = composeWindows.length - 1 - idx;
      const right = 24 + rightFromEnd * 336; // 320px window + 16px gap
      const titleText = w.subject && w.subject.trim() ? w.subject : 'New message';
      return `
        <div class="compose-window ${w.minimized ? 'minimized' : 'expanded'}" style="right:${right}px;z-index:${50 + idx};">
          <div class="compose-header" onclick="toggleMinimizeCompose(${w.id})">

              <div class="compose-title">${titleText}</div>

            <div class="compose-header-actions">
              <div class="compose-icon-btn" onclick="event.stopPropagation(); toggleMinimizeCompose(${w.id})">

          <div class="compose-body">
            <div class="compose-fields">
              <div class="compose-field-row">
                <span class="field-prefix">To</span>
                <input type="text">
              </div>
              <div class="compose-field-row">
                <input type="text" class="subject" placeholder="Subject" oninput="setComposeSubject(${w.id}, this.value)">

            <textarea class="compose-textarea" placeholder="Write your message..."></textarea>

            <div class="compose-toolbar">
              <div class="compose-icon-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 4h7a3.5 3.5 0 0 1 0 7H6zM6 11h8a3.5 3.5 0 0 1 0 7H6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
              <div class="compose-icon-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M10 5h7M8 19h7M13 5l-4 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
              <div class="compose-icon-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 19h12M9 19V6.5a3 3 0 0 1 6 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
              <div class="compose-toolbar-divider"></div>
              <div class="compose-icon-btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M8 12.5l6.5-6.5a3 3 0 0 1 4.2 4.2L10 18.9a5 5 0 1 1-7-7L11.5 3.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>

            <div class="compose-footer">
              <div class="compose-icon-btn danger" onclick="discardComposeWindow(${w.id})">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9.5 7V5a1.5 1.5 0 0 1 1.5-1.5h2A1.5 1.5 0 0 1 14.5 5v2M6 7l1 12.5A2 2 0 0 0 9 21.3h6a2 2 0 0 0 2-1.8L18 7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
              </div>
              <div class="compose-send-btn" onclick="sendComposeWindow(${w.id})">
                Send
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 11L20 4L13 21L11 13L3 11Z" fill="white"/></svg>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function openCompose() {
    composeWindows.push({ id: nextComposeId++, minimized: false, subject: '' });
    renderComposeWindows();
  }
  function closeComposeWindow(id) {
    composeWindows = composeWindows.filter(w => w.id !== id);
    renderComposeWindows();
  }
  function toggleMinimizeCompose(id) {
    const w = composeWindows.find(w => w.id === id);
    if (w) w.minimized = !w.minimized;
    renderComposeWindows();
  }
  function setComposeSubject(id, subject) {
    const w = composeWindows.find(w => w.id === id);
    if (w) w.subject = subject;
    renderComposeWindows();
  }
  function discardComposeWindow(id) { closeComposeWindow(id); showToast('Draft discarded'); }
  function sendComposeWindow(id) { closeComposeWindow(id); showToast('Message sent'); }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-message').textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  // ================== SIDEBAR PARTICLES (drift only, no mouse interaction) ==================
  (function () {
    const canvas = document.getElementById('sidebar-particles');
    const ctx = canvas.getContext('2d');
    let width = 0, height = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    let particles = [];

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      const n = parseInt(h, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    const c1 = hexToRgb('29A3E8'.replace('#',''));
    const c2 = hexToRgb('8B5CF6'.replace('#',''));

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width; height = rect.height;
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const area = width * height;
      const count = Math.max(16, Math.min(Math.round(area / 4500), 40));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * width, y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.16, vy: (Math.random() - 0.5) * 0.16,
        r: Math.random() * 1.4 + 0.8,
      }));
    }
    window.addEventListener('resize', resize);
    resize();

    function tick() {
      requestAnimationFrame(tick);
      if (!width) return;
      ctx.clearRect(0, 0, width, height);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < -8) p.x = width + 8; if (p.x > width + 8) p.x = -8;
        if (p.y < -8) p.y = height + 8; if (p.y > height + 8) p.y = -8;
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < 95*95) {
            const alpha = (1 - Math.sqrt(d2) / 95) * 0.14;
            ctx.strokeStyle = `rgba(${c1.r},${c1.g},${c1.b},${alpha})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }
      particles.forEach((p, idx) => {
        const c = idx % 2 === 0 ? c1 : c2;
        ctx.beginPath();
        ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},0.7)`;
        ctx.shadowColor = `rgba(${c.r},${c.g},${c.b},0.8)`;
        ctx.shadowBlur = 5;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
    }
    requestAnimationFrame(tick);
  })();

  renderAll();
</script>
</body>
</html>
