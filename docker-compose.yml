services:
  email-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "4002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Mailcow__ApiUrl=${MAILCOW_API_URL:-}
      - Mailcow__ApiKey=${MAILCOW_API_KEY:-}
      - Imap__Host=${IMAP_HOST:-stage-mail.innovayse.com}
      - Imap__Port=${IMAP_PORT:-993}
      - Imap__UseSsl=true
      - Smtp__Host=${SMTP_HOST:-stage-mail.innovayse.com}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__UseSsl=true
      - Cors__AllowedOrigins__0=https://stage-mail.innovayse.com
      - "EncryptionKey=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env, generate with openssl rand -base64 32}"
    extra_hosts:
      - "stage-mail.innovayse.com:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - innovayse_network

  email-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NUXT_PUBLIC_MAIN_URL: https://stage.innovayse.com
    ports:
      - "4003:3000"
    environment:
      - NUXT_API_PROXY_TARGET=http://email-api:8080
      - NUXT_PUBLIC_MAIN_URL=https://stage.innovayse.com
      - SECURE_COOKIES=true
    depends_on:
      email-api:
        condition: service_healthy
    networks:
      - default
      - innovayse_network

networks:
  default:
  innovayse_network:
    external: true
    name: innovayse-cloud-local_innovayse_network
